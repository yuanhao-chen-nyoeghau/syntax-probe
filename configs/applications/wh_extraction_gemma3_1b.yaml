# Apply trained probes to wh-extraction stimuli using Gemma-3-1B.
# Auto-resolves to the latest probe-training run named "gemma3_1b_ud_ewt".

runtime:
  seed: 13
  output_dir: results
  cache_dir: data/cache
  log_level: INFO

model:
  model_name: google/gemma-3-1b-pt
  torch_dtype: bfloat16
  batch_size: 1024
  max_length: 64
  subword_pooling: mean

experiment:
  kind: apply_probes
  name: wh_extraction_gemma3_1b
  probe_run_name: gemma3_1b_ud_ewt
  stimuli_kind: wh_extraction
  stimuli_config:
    kind: wh_extraction_stimuli
    name: default
    num_items: 1000
  activation_cache_name: wh_extraction_stimuli
