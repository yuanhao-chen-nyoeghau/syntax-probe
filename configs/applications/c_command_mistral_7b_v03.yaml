# Apply trained probes to c-command stimuli using Mistral-7B-v0.3.
# Auto-resolves to the latest probe-training run named "mistral_7b_v03_ud_ewt".

runtime:
  seed: 13
  output_dir: results
  cache_dir: data/cache
  log_level: INFO

model:
  model_name: mistralai/Mistral-7B-v0.3
  torch_dtype: bfloat16
  batch_size: 512
  max_length: 80
  subword_pooling: mean

experiment:
  kind: apply_probes
  name: c_command_mistral_7b_v03
  probe_run_name: mistral_7b_v03_ud_ewt
  stimuli_kind: c_command
  stimuli_config:
    kind: c_command_stimuli
    name: default
    num_items: 1000
  activation_cache_name: c_command_stimuli
