# Apply trained probes to wh-extraction stimuli using Qwen-3-1.7B.
# Auto-resolves to the latest probe-training run named "qwen3_1_7b_ud_ewt".

runtime:
  seed: 13
  output_dir: results
  cache_dir: data/cache
  log_level: INFO

model:
  model_name: Qwen/Qwen3-1.7B
  torch_dtype: bfloat16
  batch_size: 768
  max_length: 64
  subword_pooling: mean

experiment:
  kind: apply_probes
  name: wh_extraction_qwen3_1_7b
  probe_run_name: qwen3_1_7b_ud_ewt
  stimuli_kind: wh_extraction
  stimuli_config:
    kind: wh_extraction_stimuli
    name: default
    num_items: 1000
  activation_cache_name: wh_extraction_stimuli
