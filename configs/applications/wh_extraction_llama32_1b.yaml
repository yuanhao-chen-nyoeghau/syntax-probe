# Apply trained probes to wh-extraction stimuli, producing per-condition
# layer profiles. Auto-resolves to the latest probe-training run with name
# "llama32_1b_ud_ewt" by default.

runtime:
  seed: 13
  output_dir: results
  cache_dir: data/cache
  log_level: INFO

model:
  model_name: meta-llama/Llama-3.2-1B
  torch_dtype: bfloat16
  batch_size: 1024
  max_length: 64
  subword_pooling: mean  # must match the trained probe bank's pooling

experiment:
  kind: apply_probes
  name: wh_extraction_llama32_1b
  probe_run_name: llama32_1b_ud_ewt
  stimuli_kind: wh_extraction
  stimuli_config:
    kind: wh_extraction_stimuli
    name: default
    num_items: 1000
  activation_cache_name: wh_extraction_stimuli
