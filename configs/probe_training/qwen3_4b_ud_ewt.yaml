# Train Hewitt & Manning structural probes per layer on UD English EWT,
# using Qwen-3-4B as the backbone. Apache 2.0; mid-scale Qwen 3.
#
# See the model card on Hugging Face for layer count / hidden size:
#   https://huggingface.co/Qwen/Qwen3-4B
# Adjust batch_size if you have more or less VRAM headroom than the
# template assumes.

runtime:
  seed: 13
  output_dir: results
  cache_dir: data/cache
  log_level: INFO

model:
  model_name: Qwen/Qwen3-4B
  torch_dtype: bfloat16
  batch_size: 128
  max_length: 256
  subword_pooling: mean

experiment:
  kind: probe_training
  name: qwen3_4b_ud_ewt
  corpus_path: data/ud_ewt/ud_ewt_master.jsonl
  activation_cache_name: ud_ewt
  layers: null

  probe:
    rank: 64
    learning_rate: 1.0e-3
    epochs: 100
    batch_size: 256
    input_normalization: per_corpus_standardize
    lr_decay_factor: 0.1
    lr_decay_patience: 1
    lr_decay_max_resets: 4
