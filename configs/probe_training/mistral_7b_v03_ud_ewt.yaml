# Train Hewitt & Manning structural probes per layer on UD English EWT,
# using Mistral-7B-v0.3 as the backbone. Apache 2.0; standard full-attention decoder.
#
# See the model card on Hugging Face for layer count / hidden size:
#   https://huggingface.co/mistralai/Mistral-7B-v0.3
# Adjust batch_size if you have more or less VRAM headroom than the
# template assumes.

runtime:
  seed: 13
  output_dir: results
  cache_dir: data/cache
  log_level: INFO

model:
  model_name: mistralai/Mistral-7B-v0.3
  torch_dtype: bfloat16
  batch_size: 128
  max_length: 256
  subword_pooling: mean

experiment:
  kind: probe_training
  name: mistral_7b_v03_ud_ewt
  corpus_path: data/ud_ewt/ud_ewt_master.jsonl
  activation_cache_name: ud_ewt
  layers: null

  probe:
    rank: 64
    learning_rate: 1.0e-3
    epochs: 100
    batch_size: 256
    input_normalization: per_corpus_standardize
    lr_decay_factor: 0.1
    lr_decay_patience: 1
    lr_decay_max_resets: 4
