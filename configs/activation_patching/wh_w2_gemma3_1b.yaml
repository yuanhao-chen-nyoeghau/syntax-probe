# W2 — phase-edge specificity, Gemma-3-1B.
#
# Patches at L4 (the model's β-peak observational layer for the wh-esubj
# finite-bare contrast). Filtered to lexical-DP-embedded-subject items
# (~430 of 1000) for the lexically-clean primary analysis. Both the
# (finite, bare) and (infinitival, bare) source-target pairs.
#
# Auto-resolves to the latest probe-training run named "gemma3_1b_ud_ewt".
# See docs/activation_patching_plan.md §3.1 for the full protocol.

runtime:
  seed: 13
  output_dir: results
  cache_dir: data/cache
  log_level: INFO

model:
  model_name: google/gemma-3-1b-pt
  torch_dtype: bfloat16
  batch_size: 256
  max_length: 64
  subword_pooling: mean

experiment:
  kind: activation_patching
  name: wh_w2_gemma3_1b
  probe_run_name: gemma3_1b_ud_ewt
  stimuli_kind: wh_extraction
  stimuli_config:
    kind: wh_extraction_stimuli
    name: default
    num_items: 1000
  variant_config:
    variant: w2
    intervention_layer: 4
    intervention_roles:
      - wh
      - embedded_subject
      - embedded_verb
    source_target_pairs:
      - [finite, bare]
      - [infinitival, bare]
    filter_to_lexical_dp: true
