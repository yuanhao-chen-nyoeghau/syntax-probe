# N1 — per-layer robustness causality, Gemma-3-27B.
#
# Patches at L1, the model's β-peak observational layer for the cc
# reflexive 3-way interaction (averaged across the four modifier types;
# see docs/activation_patching_plan.md §3.3). Bidirectional protocol:
# match→swap and swap→match both run.
#
# Auto-resolves to the latest probe-training run named "gemma3_27b_ud_ewt".

runtime:
  seed: 13
  output_dir: results
  cache_dir: data/cache
  log_level: INFO

model:
  model_name: google/gemma-3-27b-pt
  torch_dtype: bfloat16
  batch_size: 64
  max_length: 80
  subword_pooling: mean

experiment:
  kind: activation_patching
  name: cc_n1_gemma3_27b
  probe_run_name: gemma3_27b_ud_ewt
  stimuli_kind: c_command
  stimuli_config:
    kind: c_command_stimuli
    name: default
    num_items: 1000
  variant_config:
    variant: n1
    intervention_layer: 1
    bidirectional: true
