# N1 — per-layer robustness causality, Qwen-3-1.7B.
#
# Patches at L2, the model's β-peak observational layer for the cc
# reflexive 3-way interaction (averaged across the four modifier types;
# see docs/activation_patching_plan.md §3.3). Bidirectional protocol:
# match→swap and swap→match both run.
#
# Auto-resolves to the latest probe-training run named "qwen3_1_7b_ud_ewt".

runtime:
  seed: 13
  output_dir: results
  cache_dir: data/cache
  log_level: INFO

model:
  model_name: Qwen/Qwen3-1.7B
  torch_dtype: bfloat16
  batch_size: 192
  max_length: 80
  subword_pooling: mean

experiment:
  kind: activation_patching
  name: cc_n1_qwen3_1_7b
  probe_run_name: qwen3_1_7b_ud_ewt
  stimuli_kind: c_command
  stimuli_config:
    kind: c_command_stimuli
    name: default
    num_items: 1000
  variant_config:
    variant: n1
    intervention_layer: 2
    bidirectional: true
