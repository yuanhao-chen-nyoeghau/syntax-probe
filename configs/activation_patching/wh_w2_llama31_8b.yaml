# W2 — phase-edge specificity, Llama-3.1-8B.
#
# Patches at L3 (the model's β-peak observational layer for the
# wh-esubj finite-bare contrast; see docs/activation_patching_plan.md §3.1
# for the full per-model table). Filtered to lexical-DP-embedded-subject
# items (~430/1000) for the lexically-clean primary analysis. Both the
# (finite, bare) and (infinitival, bare) source-target pairs.
#
# Auto-resolves to the latest probe-training run named "llama31_8b_ud_ewt".

runtime:
  seed: 13
  output_dir: results
  cache_dir: data/cache
  log_level: INFO

model:
  model_name: meta-llama/Llama-3.1-8B
  torch_dtype: bfloat16
  batch_size: 128
  max_length: 64
  subword_pooling: mean

experiment:
  kind: activation_patching
  name: wh_w2_llama31_8b
  probe_run_name: llama31_8b_ud_ewt
  stimuli_kind: wh_extraction
  stimuli_config:
    kind: wh_extraction_stimuli
    name: default
    num_items: 1000
  variant_config:
    variant: w2
    intervention_layer: 3
    intervention_roles:
      - wh
      - embedded_subject
      - embedded_verb
    source_target_pairs:
      - [finite, bare]
      - [infinitival, bare]
    filter_to_lexical_dp: true
